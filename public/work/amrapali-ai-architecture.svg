<svg width="1100" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1100" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="550" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e293b">
    AI-Powered Real Estate Lead Automation System
  </text>
  
  <!-- Lead Capture Layer -->
  <g id="lead-capture">
    <rect x="50" y="80" width="220" height="180" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e40af">Lead Capture Sources</text>
    
    <rect x="70" y="130" width="180" height="30" rx="4" fill="#fff" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="151" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1e293b">📝 Website Forms</text>
    
    <rect x="70" y="170" width="180" height="30" rx="4" fill="#fff" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="191" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1e293b">💬 AI Chatbot</text>
    
    <rect x="70" y="210" width="180" height="30" rx="4" fill="#fff" stroke="#60a5fa" stroke-width="1"/>
    <text x="160" y="231" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#1e293b">📢 Meta & Google Ads</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 270 170 L 330 170" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- n8n Workflow Layer -->
  <g id="n8n-layer">
    <rect x="330" y="80" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="440" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400e">n8n Workflow Engine</text>
    
    <rect x="350" y="130" width="180" height="35" rx="4" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
    <text x="440" y="151" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b">Lead Deduplication</text>
    <text x="440" y="160" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">& Normalization</text>
    
    <rect x="350" y="175" width="180" height="35" rx="4" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
    <text x="440" y="196" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b">Webhook Routing</text>
    <text x="440" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Multi-channel ingestion</text>
    
    <rect x="350" y="220" width="180" height="30" rx="4" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
    <text x="440" y="241" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b">⚡ Trigger AI Engine</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 550 170 L 610 170" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- AI Qualification Engine -->
  <g id="ai-engine">
    <rect x="610" y="80" width="220" height="180" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="720" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#3730a3">AI Qualification Engine</text>
    
    <rect x="630" y="130" width="180" height="30" rx="4" fill="#fff" stroke="#818cf8" stroke-width="1"/>
    <text x="720" y="151" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b">🧠 LangChain + Groq LLM</text>
    
    <rect x="630" y="170" width="180" height="30" rx="4" fill="#fff" stroke="#818cf8" stroke-width="1"/>
    <text x="720" y="191" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b">💾 Redis Memory Store</text>
    
    <rect x="630" y="210" width="180" height="35" rx="4" fill="#fff" stroke="#818cf8" stroke-width="1"/>
    <text x="720" y="228" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b">WhatsApp Engagement</text>
    <text x="720" y="239" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Context-aware conversations</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 720 260 L 720 320" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Lead Classification -->
  <g id="classification">
    <rect x="610" y="320" width="220" height="110" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
    <text x="720" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b21a8">Lead Classification & Scoring</text>
    
    <text x="640" y="370" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">🔥 Hot: Ready to buy (3mo)</text>
    <text x="640" y="390" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">🟠 Warm: Interested (6-12mo)</text>
    <text x="640" y="410" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">❄️ Cold: Browsing (12mo+)</text>
  </g>
  
  <!-- Hot Lead Path -->
  <path d="M 610 360 L 300 360 L 300 480" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="310" y="420" font-family="Arial, sans-serif" font-size="11" fill="#dc2626">Hot</text>
  
  <!-- Warm Lead Path -->
  <path d="M 720 430 L 720 480" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>
  
  <!-- Cold Lead Path -->
  <path d="M 830 380 L 1010 380 L 1010 480" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowhead-cyan)"/>
  <text x="900" y="375" font-family="Arial, sans-serif" font-size="11" fill="#0891b2">Cold</text>
  
  <!-- Sales Escalation (Hot) -->
  <g id="sales-escalation">
    <rect x="190" y="480" width="220" height="140" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="300" y="505" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">🚨 Instant Sales Escalation</text>
    
    <rect x="210" y="520" width="180" height="25" rx="4" fill="#fff" stroke="#f87171" stroke-width="1"/>
    <text x="300" y="538" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">WhatsApp Alert to Team</text>
    
    <rect x="210" y="550" width="180" height="25" rx="4" fill="#fff" stroke="#f87171" stroke-width="1"/>
    <text x="300" y="568" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">CRM Task Creation</text>
    
    <rect x="210" y="580" width="180" height="25" rx="4" fill="#fff" stroke="#f87171" stroke-width="1"/>
    <text x="300" y="598" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">📞 Call within 5 mins</text>
  </g>
  
  <!-- Nurturing (Warm) -->
  <g id="nurturing">
    <rect x="610" y="480" width="220" height="140" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
    <text x="720" y="505" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#9a3412">🌱 Automated Nurturing</text>
    
    <rect x="630" y="520" width="180" height="25" rx="4" fill="#fff" stroke="#fb923c" stroke-width="1"/>
    <text x="720" y="538" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">Weekly Property Updates</text>
    
    <rect x="630" y="550" width="180" height="25" rx="4" fill="#fff" stroke="#fb923c" stroke-width="1"/>
    <text x="720" y="568" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">Market Insights & Reports</text>
    
    <rect x="630" y="580" width="180" height="25" rx="4" fill="#fff" stroke="#fb923c" stroke-width="1"/>
    <text x="720" y="598" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">Virtual Tour Invitations</text>
  </g>
  
  <!-- Drip Campaign (Cold) -->
  <g id="drip-campaign">
    <rect x="900" y="480" width="170" height="140" rx="8" fill="#cffafe" stroke="#06b6d4" stroke-width="2"/>
    <text x="985" y="505" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#164e63">❄️ Drip Campaigns</text>
    
    <rect x="915" y="520" width="140" height="25" rx="4" fill="#fff" stroke="#22d3ee" stroke-width="1"/>
    <text x="985" y="538" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">Monthly Newsletters</text>
    
    <rect x="915" y="550" width="140" height="25" rx="4" fill="#fff" stroke="#22d3ee" stroke-width="1"/>
    <text x="985" y="568" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">Market Reports</text>
    
    <rect x="915" y="580" width="140" height="25" rx="4" fill="#fff" stroke="#22d3ee" stroke-width="1"/>
    <text x="985" y="598" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1e293b">Re-engage 90d</text>
  </g>
  
  <!-- Bottom CRM Layer -->
  <rect x="190" y="640" width="880" height="40" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="630" y="665" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">🗄️ CRM Integration (Unified Lead Database with Full Conversation History)</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#06b6d4"/>
    </marker>
  </defs>
</svg>